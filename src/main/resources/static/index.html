<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Personas - Spring Boot CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Registro de Personas</h2>

<div class="card card-body mb-4 shadow-sm">
    <h5>Agregar Nueva Persona</h5>
    <form id="registroForm">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" id="firstName" class="form-control" placeholder="Ej: Juan" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido:</label>
                <input type="text" id="lastName" class="form-control" placeholder="Ej: Pérez" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control" placeholder="juan@correo.com" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Teléfono:</label>
                <input type="text" id="phoneNumber" class="form-control" placeholder="0999999999" required>
            </div>
        </div>
        <button type="submit" class="btn btn-success">Guardar Persona</button>
    </form>
</div>

<div class="card card-body shadow-sm">
    <h5>Listado de Personas</h5>
    <table class="table table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaCuerpo">
        </tbody>
    </table>
</div>

<script>
    const API_URL = "http://localhost:9090/api/people";

    // READ
    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Error al obtener datos");

            const datos = await res.json();
            let html = '';

            datos.forEach(p => {
                html += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.firstName}</td>
                            <td>${p.lastName}</td>
                            <td>${p.email}</td>
                            <td>${p.phoneNumber}</td>
                            <td>
                                <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
                            </td>
                        </tr>`;
            });
            document.getElementById('tablaCuerpo').innerHTML = html;
        } catch (error) {
            console.error("Error:", error);
        }
    }

    // CREATE
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // objeto de Person con atributos
        const nuevaPersona = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phoneNumber: document.getElementById('phoneNumber').value
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevaPersona)
            });

            if (response.ok) {
                alert("¡Persona registrada con éxito!");
                document.getElementById('registroForm').reset(); // limpiar el formulario
                cargarDatos(); // refrescar la tabla
            } else {
                alert("Error al guardar. Revisa la consola.");
            }
        } catch (error) {
            console.error("Error al enviar:", error);
        }
    });

    // DELETE
    async function eliminar(id) {
        if(confirm('¿Estás seguro de eliminar este registro?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            cargarDatos();
        }
    }

    // ejecutar al cargar la página por primera vez
    cargarDatos();
</script>
</body>
</html>
