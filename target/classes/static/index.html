<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Personas - Spring Boot CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="mb-4">Registro de Personas</h2>

<div class="card card-body mb-4 shadow-sm">
    <h5 id="formTitulo">Agregar Nueva Persona</h5>
    <form id="registroForm">
        <input type="hidden" id="editId">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" id="firstName" class="form-control" placeholder="Ej: Juan" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido:</label>
                <input type="text" id="lastName" class="form-control" placeholder="Ej: Pérez" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control" placeholder="juan@correo.com" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Teléfono:</label>
                <input type="text" id="phoneNumber" class="form-control" placeholder="0999999999" required>
            </div>
        </div>
        <button type="submit" id="btnGuardar" class="btn btn-success">Guardar Persona</button>
        <button type="button" id="btnCancelar" class="btn btn-secondary d-none" onclick="limpiarFormulario()">Cancelar</button>
    </form>
</div>

<div class="card card-body shadow-sm">
    <h5>Listado de Personas</h5>
    <div class="mb-3">
        <input type="number" id="buscarId" class="form-control" placeholder="Buscar por ID">
        <button class="btn btn-primary mt-2" onclick="buscarPorId()">Buscar</button>
    </div>
    <table class="table table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaCuerpo">
        </tbody>
    </table>
</div>

<script>
    const API_URL = "http://localhost:9090/api/people";

    // READ
    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Error al obtener datos");

            const datos = await res.json();
            let html = '';

            datos.forEach(p => {
                html += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.firstName}</td>
                            <td>${p.lastName}</td>
                            <td>${p.email}</td>
                            <td>${p.phoneNumber}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="prepararEdicion(${p.id}, '${p.firstName}', '${p.lastName}', '${p.email}', '${p.phoneNumber}')">Editar</button>
                                <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
                            </td>
                        </tr>`;
            });
            document.getElementById('tablaCuerpo').innerHTML = html;
        } catch (error) {
            console.error("Error:", error);
        }
    }

    async function buscarPorId() {
        const id = document.getElementById('buscarId').value;

        if (!id) {
            alert("Ingresa un ID");
            return;
        }

        try {
            const res = await fetch(`${API_URL}/${id}`);
            if (!res.ok) throw new Error("No encontrado");

            const p = await res.json();

            const html = `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.firstName}</td>
                    <td>${p.lastName}</td>
                    <td>${p.email}</td>
                    <td>${p.phoneNumber}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="prepararEdicion(${p.id}, '${p.firstName}', '${p.lastName}', '${p.email}', '${p.phoneNumber}')">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
                    </td>
                </tr>
            `;

            document.getElementById('tablaCuerpo').innerHTML = html;

        } catch (error) {
            alert("Persona no encontrada");
        }
    }

    // CREATE & UPDATE
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const idParaEditar = document.getElementById('editId').value;
        const personaData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phoneNumber: document.getElementById('phoneNumber').value
        };

        const metodo = idParaEditar ? 'PUT' : 'POST';
        const urlFinal = idParaEditar ? `${API_URL}/${idParaEditar}` : API_URL;

        try {
            const response = await fetch(urlFinal, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(personaData)
            });

            if (response.ok) {
                alert(idParaEditar ? "¡Persona actualizada!" : "¡Persona registrada!");
                limpiarFormulario();
                cargarDatos();
            } else {
                alert("Error al procesar la solicitud.");
            }
        } catch (error) {
            console.error("Error:", error);
        }
    });

    // Cargar datos en el formulario para editar
    function prepararEdicion(id, firstName, lastName, email, phoneNumber) {
        document.getElementById('editId').value = id;
        document.getElementById('firstName').value = firstName;
        document.getElementById('lastName').value = lastName;
        document.getElementById('email').value = email;
        document.getElementById('phoneNumber').value = phoneNumber;

        document.getElementById('formTitulo').innerText = "Editar Persona ID: " + id;
        document.getElementById('btnGuardar').innerText = "Actualizar Persona";
        document.getElementById('btnGuardar').className = "btn btn-primary";
        document.getElementById('btnCancelar').classList.remove('d-none');
    }

    function limpiarFormulario() {
        document.getElementById('registroForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('formTitulo').innerText = "Agregar Nueva Persona";
        document.getElementById('btnGuardar').innerText = "Guardar Persona";
        document.getElementById('btnGuardar').className = "btn btn-success";
        document.getElementById('btnCancelar').classList.add('d-none');
    }

    // DELETE
    async function eliminar(id) {
        if(confirm('¿Estás seguro de eliminar este registro?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            cargarDatos();
        }
    }

    cargarDatos();
</script>
</body>
</html>
